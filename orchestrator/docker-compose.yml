# Run from inside orchestrator/ or from the repo root.
# The build context is set to the repo root (..) so that the Dockerfile can
# copy orchestrator/ as a package and "uvicorn orchestrator.main:app" works.
#
# Quick start:
#   cp .env.example .env   # set POSTGRES_PASSWORD and JWT_SECRET
#   docker compose up

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-gruper}
      POSTGRES_USER:     ${POSTGRES_USER:-gruper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env.example}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gruper}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  orchestrator:
    build:
      context: ..                        # repo root — Dockerfile COPYs orchestrator/ as a package
      dockerfile: orchestrator/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gruper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gruper}
      JWT_SECRET:   ${JWT_SECRET:?JWT_SECRET is required — see .env.example}
      LOG_LEVEL:    ${LOG_LEVEL:-INFO}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      # Hot reload: mounts repo root so code changes are picked up without rebuild.
      # Remove this volume for production deployments.
      - ../:/app

volumes:
  postgres_data:
