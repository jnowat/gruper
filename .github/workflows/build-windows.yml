name: Build Windows Installer

# Triggers:
#   - Push to main: build and upload installers as workflow artifacts.
#   - Version tag (v*): build, upload artifacts, AND create a draft GitHub Release.
#     Publish the draft manually after reviewing.
#
# This workflow always produces at least one downloadable artifact:
#   - Console not yet scaffolded (pre WP-05): uploads BUILD-STATUS.txt explaining status.
#   - Console ready:                           uploads the real .exe and .msi installers.
on:
  push:
    branches: [main]
    tags:
      - 'v*'

# Cancel an in-progress build on the same ref when a new push arrives.
concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows x64 — NSIS (.exe) + WiX (.msi)
    runs-on: windows-latest

    # contents:write lets tauri-action create/update a GitHub Release on tag builds.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Readiness check ──────────────────────────────────────────────────────
      # The console/ Tauri project is scaffolded in WP-05. Until then the job
      # takes the placeholder path (Path A) instead of the build path (Path B).
      - name: Check console project readiness
        id: readiness
        shell: bash
        run: |
          if [[ -f "console/src-tauri/tauri.conf.json" && -f "console/package.json" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Console project found — taking build path."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "console/src-tauri/tauri.conf.json not found — taking placeholder path."
          fi

      # ════════════════════════════════════════════════════════════════════════
      # Path A — console not yet scaffolded
      # Uploads a plain-text status file so the workflow always has at least
      # one downloadable artifact and users can see what to expect.
      # ════════════════════════════════════════════════════════════════════════

      - name: Create BUILD-STATUS.txt placeholder
        if: steps.readiness.outputs.ready != 'true'
        shell: bash
        run: |
          mkdir -p _placeholder
          printf '%s\n' \
            "Gruper Console — Windows Installer" \
            "===================================" \
            "" \
            "Status: NOT READY YET — waiting for WP-05" \
            "" \
            "The Manager Console (Tauri v2 + Svelte 5) has not been" \
            "scaffolded yet. Real installers will appear here once" \
            "console/src-tauri/tauri.conf.json lands in the repository." \
            "" \
            "Milestone:  WP-05 — Manager Console Minimal Scaffold (gd-0.2)" \
            "Roadmap:    https://github.com/jnowat/gruper/blob/main/ROADMAP.md" \
            "Downloads:  https://github.com/jnowat/gruper#downloads" \
            "" \
            "When ready, this workflow produces:" \
            "  gruper-console-*-windows-x64-setup.exe   (NSIS installer)" \
            "  gruper-console-*-windows-x64.msi          (WiX MSI installer)" \
            > _placeholder/BUILD-STATUS.txt
          cat _placeholder/BUILD-STATUS.txt

      - name: Upload BUILD-STATUS.txt placeholder
        if: steps.readiness.outputs.ready != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gruper-console-windows-BUILD-STATUS
          path: _placeholder/BUILD-STATUS.txt
          retention-days: 7

      # ════════════════════════════════════════════════════════════════════════
      # Path B — console is ready, run the full Tauri build
      # ════════════════════════════════════════════════════════════════════════

      # ── Frontend toolchain ───────────────────────────────────────────────────
      # setup-node's built-in npm cache requires package-lock.json to exist;
      # use a manual actions/cache step (also gated) to avoid that dependency.

      - name: Set up Node.js 20
        if: steps.readiness.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        if: steps.readiness.outputs.ready == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-windows-${{ hashFiles('console/package-lock.json') }}
          restore-keys: npm-windows-

      # ── Rust toolchain ───────────────────────────────────────────────────────

      - name: Set up Rust stable (x86_64-pc-windows-msvc)
        if: steps.readiness.outputs.ready == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Cold Rust builds take 15–25 min; warm cache cuts that to under 3 min.
      - name: Cache Rust build artifacts
        if: steps.readiness.outputs.ready == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: console/src-tauri -> target

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Install frontend dependencies
        if: steps.readiness.outputs.ready == 'true'
        run: npm ci
        working-directory: console

      - name: Build Tauri app (Windows x64)
        if: steps.readiness.outputs.ready == 'true'
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── Code signing (placeholder — unsigned for pre-v1 builds) ──────────
          #
          # Without a certificate Windows SmartScreen shows an "Unknown publisher"
          # warning on first run. Acceptable for pre-v1 internal testing.
          # Enable signing before any public release.
          #
          # Self-signed certificate (dev/testing only):
          #   1. Generate a PFX:
          #        openssl req -x509 -newkey rsa:4096 -keyout key.pem -out cert.pem \
          #          -days 365 -nodes -subj "/CN=Gruper Dev"
          #        openssl pkcs12 -export -out cert.pfx \
          #          -inkey key.pem -in cert.pem -passout pass:changeme
          #   2. Base64-encode it and store as a repository secret:
          #        base64 -w 0 cert.pfx  →  TAURI_SIGNING_PRIVATE_KEY
          #   3. Store the export password as: TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          #
          # Production EV certificate (DigiCert / Sectigo / GlobalSign):
          #   Follow the vendor's signing docs, then set the same two secrets.
          #
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

        with:
          projectPath: console
          # nsis → NSIS portable installer (.exe) — no admin rights required
          # msi  → WiX MSI installer (.msi)      — enterprise / Group Policy compatible
          args: --target x86_64-pc-windows-msvc --bundles nsis,msi
          # tagName is non-empty only on version-tag pushes; tauri-action skips
          # release creation when tagName resolves to an empty string.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: Gruper Console ${{ github.ref_name }}
          releaseBody: |
            See [ROADMAP.md](https://github.com/jnowat/gruper/blob/main/ROADMAP.md) for what changed.

            > **Pre-release:** Gruper Distributed is pre-v1. These builds are for
            > testing only. Binaries are unsigned — Windows SmartScreen will show
            > an "Unknown publisher" warning on first run.
          releaseDraft: true   # always draft; publish manually after reviewing
          prerelease: true     # all gd-0.x builds are pre-releases

      # ── Debug output on failure ──────────────────────────────────────────────

      - name: Debug info (on build failure)
        if: steps.readiness.outputs.ready == 'true' && failure()
        shell: bash
        run: |
          echo "=== directory listing: console/ ==="
          ls -la console/ || echo "(not found)"
          echo "=== directory listing: console/src-tauri/ ==="
          ls -la console/src-tauri/ || echo "(not found)"
          echo "=== Rust toolchain ==="
          rustup show
          rustup target list --installed
          echo "=== Node / npm versions ==="
          node --version && npm --version
          echo "=== tauri info ==="
          cd console && npx tauri info || true

      # ── Artifact upload ──────────────────────────────────────────────────────
      # On tag builds these are also attached to the GitHub Release draft above.

      - name: Upload NSIS installer (.exe)
        if: steps.readiness.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gruper-console-${{ github.ref_name }}-windows-x64-setup.exe
          path: console/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Upload MSI installer
        if: steps.readiness.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gruper-console-${{ github.ref_name }}-windows-x64.msi
          path: console/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 30
          if-no-files-found: warn

      # ── Job summary ──────────────────────────────────────────────────────────

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.readiness.outputs.ready }}" != "true" ]]; then
            printf '%s\n' \
              "## Gruper Console — Windows Build" \
              "" \
              "**Status: waiting for WP-05**" \
              "" \
              "The Manager Console Tauri project (\`console/\`) has not been scaffolded yet." \
              "A \`BUILD-STATUS.txt\` placeholder has been uploaded as an artifact." \
              "" \
              "Real \`.exe\` and \`.msi\` installers will appear here once" \
              "\`console/src-tauri/tauri.conf.json\` exists in the repository." \
              >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n' \
              "## Gruper Console — Windows Build" \
              "" \
              "**Status: complete**" \
              "" \
              "| Artifact | Format | Notes |" \
              "|----------|--------|-------|" \
              "| \`*-setup.exe\` | NSIS installer | No admin rights required |" \
              "| \`*.msi\` | WiX MSI | Enterprise / Group Policy compatible |" \
              "" \
              "Artifacts attached to this run (30-day retention)." \
              >> "$GITHUB_STEP_SUMMARY"
            if [[ "${{ github.ref_type }}" == "tag" ]]; then
              printf '%s\n' \
                "" \
                "Draft release created for tag \`${{ github.ref_name }}\` — publish manually when ready." \
                >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
