name: Orchestrator Tests

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # Desktop default: an embedded SQLite file, no external service — the
  # same experience a desktop user gets running `pytest` with no setup.
  # Split into its own job (rather than a matrix leg sharing a job with
  # the postgres job below) specifically so it needs zero services,
  # proving the desktop-tier claim rather than just asserting it.
  test-sqlite:
    name: pytest (sqlite — desktop default)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install orchestrator dependencies
        working-directory: orchestrator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: orchestrator
        run: python -m pytest tests/ -v

  # Server/advanced tier: PostgreSQL via a service container.
  test-postgres:
    name: pytest (postgres — server tier)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gruper_test
          POSTGRES_USER: gruper
          POSTGRES_PASSWORD: gruper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gruper"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install orchestrator dependencies
        working-directory: orchestrator
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        working-directory: orchestrator
        env:
          TEST_DATABASE_URL: postgresql://gruper:gruper@localhost:5432/gruper_test
        run: python -m pytest tests/ -v
