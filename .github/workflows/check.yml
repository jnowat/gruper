name: Dependency & Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify CDN URLs are reachable
        run: |
          CHARTJS_VER=$(grep -oP 'chart\.js@\K[\d.]+' Gruper.html | head -1)
          DOMPURIFY_VER=$(grep -oP 'dompurify@\K[\d.]+' Gruper.html | head -1)
          echo "Chart.js version in HTML: $CHARTJS_VER"
          echo "DOMPurify version in HTML: $DOMPURIFY_VER"
          if [ -z "$CHARTJS_VER" ] || [ -z "$DOMPURIFY_VER" ]; then
            echo "ERROR: Could not extract CDN library versions from Gruper.html"
            exit 1
          fi
          curl -f --head "https://cdn.jsdelivr.net/npm/chart.js@${CHARTJS_VER}/dist/chart.umd.min.js"
          curl -f --head "https://cdn.jsdelivr.net/npm/dompurify@${DOMPURIFY_VER}/dist/purify.min.js"

      - name: Extract and syntax-check JavaScript
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('Gruper.html', 'utf8');
            const match = html.match(/<script>([\s\S]*?)<\/script>\s*<\/body>/);
            if (!match) { console.error('Could not find main script block'); process.exit(1); }
            fs.writeFileSync('/tmp/gruper_script.js', match[1]);
          "
          node --check /tmp/gruper_script.js && echo "JS syntax OK"

      - name: Check version consistency
        run: |
          HTML_VER=$(grep -oP "const APP_VERSION = '\K[^']+" Gruper.html | grep -oP '^\d+\.\d+\.\d+')
          README_VER=$(grep -oP '(?<=version-)\d+\.\d+\.\d+' README.md | head -1)
          echo "Gruper.html APP_VERSION: $HTML_VER"
          echo "README.md badge version: $README_VER"
          if [ -z "$HTML_VER" ]; then
            echo "ERROR: Could not parse APP_VERSION from Gruper.html"
            exit 1
          fi
          if [ -z "$README_VER" ]; then
            echo "ERROR: Could not parse version badge from README.md"
            exit 1
          fi
          if [ "$HTML_VER" != "$README_VER" ]; then
            echo "ERROR: Version mismatch — Gruper.html has $HTML_VER but README.md badge shows $README_VER"
            exit 1
          fi
          echo "Version consistency OK: $HTML_VER"

      - name: Check for duplicate CDN script tags
        run: |
          CHARTJS_COUNT=$(grep -c "cdn.jsdelivr.net/npm/chart.js" Gruper.html || true)
          DOMPURIFY_COUNT=$(grep -c "cdn.jsdelivr.net/npm/dompurify" Gruper.html || true)
          echo "Chart.js script tags: $CHARTJS_COUNT"
          echo "DOMPurify script tags: $DOMPURIFY_COUNT"
          if [ "$CHARTJS_COUNT" -gt 1 ]; then
            echo "ERROR: Duplicate Chart.js script tags detected"
            exit 1
          fi
          if [ "$DOMPURIFY_COUNT" -gt 1 ]; then
            echo "ERROR: Duplicate DOMPurify script tags detected"
            exit 1
          fi
          echo "No duplicate CDN script tags found"
